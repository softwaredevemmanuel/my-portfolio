name: 🚀 Deploy React App to cPanel

on:
  push:
    branches: [ master ]  # Triggers the action when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Get Latest Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use your Node.js version

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🏗️ Build Project
        run: npm run build # This creates the 'build' or 'dist' folder
        env:
          CI: false # Helps prevent warnings from failing the build

      - name: 📂 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./build/ 
          server-dir: ./
          git-ftp-args: --insecure # Optional: Use if you have SSL issues with the FTP server